<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NOVA NEXUS</title>
<meta name="theme-color" content="#0f0f1a"/>
<style>
:root {
  --bg: #0f0f1a;
  --bg2: #16162a;
  --bg3: #1e1e35;
  --border: #2a2a4a;
  --accent: #7c6af7;
  --accent2: #a78bfa;
  --accent3: #38bdf8;
  --text: #e2e2f0;
  --text2: #9090b8;
  --text3: #5a5a80;
  --green: #34d399;
  --yellow: #fbbf24;
  --pink: #f472b6;
  --red: #f87171;
  --card-r: 16px;
  --trans: all 0.25s cubic-bezier(.4,0,.2,1);
}
[data-theme="light"] {
  --bg: #f0f0fa;
  --bg2: #ffffff;
  --bg3: #e8e8f5;
  --border: #d0d0e8;
  --text: #1a1a35;
  --text2: #4a4a70;
  --text3: #9090b8;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;overflow:hidden}

/* SIDEBAR */
#sidebar{width:240px;min-width:240px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:24px 0;transition:var(--trans);z-index:100}
.logo{display:flex;align-items:center;gap:10px;padding:0 20px 28px;font-size:1.2rem;font-weight:700;letter-spacing:.5px}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent3));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem}
.nav-section{font-size:.65rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);padding:0 20px 8px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 20px;cursor:pointer;transition:var(--trans);font-size:.9rem;color:var(--text2);border-left:3px solid transparent;margin:1px 0}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:linear-gradient(90deg,rgba(124,106,247,.15),transparent);color:var(--accent2);border-left-color:var(--accent)}
.nav-icon{font-size:1.1rem;width:20px;text-align:center}
.sidebar-bottom{margin-top:auto;padding:0 20px;display:flex;flex-direction:column;gap:8px}
.theme-toggle{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg3);border-radius:10px;cursor:pointer;font-size:.85rem;color:var(--text2);border:1px solid var(--border);transition:var(--trans)}
.theme-toggle:hover{border-color:var(--accent)}
.sync-status{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg3);border-radius:10px;font-size:.75rem;color:var(--text3);border:1px solid var(--border)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:background .3s}
.sync-dot.connected{background:var(--green)}
.sync-dot.syncing{background:var(--yellow);animation:pulse 1s infinite}
.sync-dot.error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{padding:20px 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--bg2)}
.greeting h2{font-size:1.3rem;font-weight:700}
.greeting p{font-size:.85rem;color:var(--text2);margin-top:2px}
.topbar-right{display:flex;align-items:center;gap:12px}
.tb-btn{width:38px;height:38px;border-radius:10px;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;transition:var(--trans);color:var(--text2)}
.tb-btn:hover{border-color:var(--accent);color:var(--accent)}
.avatar{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--pink));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.9rem;cursor:pointer}

/* CONTENT */
#content{flex:1;overflow-y:auto;padding:28px;display:flex;flex-direction:column;gap:24px}
#content::-webkit-scrollbar{width:5px}
#content::-webkit-scrollbar-track{background:transparent}
#content::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}

/* STAT CARDS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--card-r);padding:20px;transition:var(--trans);cursor:default;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--c,var(--accent))}
.stat-card:hover{transform:translateY(-2px);border-color:var(--accent)}
.stat-card .label{font-size:.75rem;color:var(--text3);text-transform:uppercase;letter-spacing:1px;font-weight:600}
.stat-card .value{font-size:2rem;font-weight:800;margin:6px 0 2px;line-height:1}
.stat-card .sub{font-size:.8rem;color:var(--text2)}
.stat-card .icon{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:2rem;opacity:.15}

/* GRID LAYOUT */
.dash-grid{display:grid;grid-template-columns:1fr 340px;gap:24px}
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sec-title{font-size:1rem;font-weight:700;display:flex;align-items:center;gap:8px}
.sec-title span{font-size:1.1rem}
.sec-action{font-size:.8rem;color:var(--accent);cursor:pointer;transition:var(--trans)}
.sec-action:hover{color:var(--accent2)}

/* CALENDAR */
.cal-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--card-r);padding:22px}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-month{font-size:1rem;font-weight:700}
.cal-nav{display:flex;gap:6px}
.cal-nav button{width:28px;height:28px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;font-size:.9rem;transition:var(--trans)}
.cal-nav button:hover{border-color:var(--accent);color:var(--accent)}
.cal-days-header{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:.7rem;color:var(--text3);font-weight:600;text-transform:uppercase;margin-bottom:8px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:.82rem;border-radius:8px;cursor:pointer;transition:var(--trans);color:var(--text2);position:relative}
.cal-day:hover{background:var(--bg3);color:var(--text)}
.cal-day.today{background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-weight:700}
.cal-day.other-month{color:var(--text3);opacity:.4}
.cal-day.has-event::after{content:'';position:absolute;bottom:3px;width:4px;height:4px;border-radius:50%;background:var(--green)}
.events-list{margin-top:16px;display:flex;flex-direction:column;gap:8px}
.event-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg3);border-radius:10px;border-left:3px solid var(--c,var(--accent));transition:var(--trans)}
.event-item:hover{transform:translateX(3px)}
.event-time{font-size:.75rem;color:var(--text3);white-space:nowrap;font-weight:600}
.event-name{font-size:.85rem;font-weight:500;flex:1}

/* NOTES */
.notes-section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--card-r);padding:22px}
.notes-masonry{columns:2;gap:14px}
.note-card{break-inside:avoid;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:14px;transition:var(--trans);cursor:pointer;position:relative}
.note-card:hover{transform:translateY(-2px);border-color:var(--accent2);box-shadow:0 8px 24px rgba(124,106,247,.15)}
.note-card.pinned::before{content:'📌';position:absolute;top:10px;right:10px;font-size:.8rem}
.note-card .note-color{width:100%;height:3px;border-radius:3px;margin-bottom:10px;background:var(--c,var(--accent))}
.note-card .note-title{font-size:.9rem;font-weight:700;margin-bottom:6px}
.note-card .note-body{font-size:.8rem;color:var(--text2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
.note-card .note-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.note-tag{font-size:.65rem;padding:2px 8px;border-radius:20px;background:var(--bg2);color:var(--text3);border:1px solid var(--border)}

/* PROJECTS */
.projects-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--card-r);padding:22px}
.project-item{padding:14px;background:var(--bg3);border-radius:12px;margin-bottom:10px;transition:var(--trans);cursor:pointer}
.project-item:hover{border:1px solid var(--accent);transform:translateX(2px)}
.project-item:last-child{margin-bottom:0}
.proj-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.proj-name{font-size:.9rem;font-weight:600}
.proj-badge{font-size:.65rem;padding:2px 8px;border-radius:20px;font-weight:600}
.badge-active{background:rgba(52,211,153,.15);color:var(--green)}
.badge-pause{background:rgba(251,191,36,.15);color:var(--yellow)}
.badge-idea{background:rgba(124,106,247,.15);color:var(--accent2)}
.proj-desc{font-size:.78rem;color:var(--text2);margin-bottom:10px}
.progress-bar{height:6px;background:var(--border);border-radius:10px;overflow:hidden}
.progress-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--accent),var(--accent3));transition:width 1s ease}
.proj-footer{display:flex;justify-content:space-between;margin-top:6px;font-size:.72rem;color:var(--text3)}
.proj-full-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--card-r);padding:22px;transition:var(--trans)}
.proj-full-card:hover{border-color:rgba(124,106,247,.4)}
.task-row{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:8px;margin-bottom:4px;transition:background .15s}
.task-row:hover{background:var(--bg3)}

/* AI CARD */
.ai-card{background:linear-gradient(135deg,rgba(124,106,247,.1),rgba(56,189,248,.05));border:1px solid rgba(124,106,247,.3);border-radius:var(--card-r);padding:22px;display:flex;align-items:center;gap:16px}
.ai-icon{font-size:2.5rem;flex-shrink:0}
.ai-text h3{font-size:1rem;font-weight:700;margin-bottom:4px}
.ai-text p{font-size:.82rem;color:var(--text2);line-height:1.4}
.ai-btn{margin-top:12px;padding:8px 18px;background:linear-gradient(135deg,var(--accent),var(--accent3));border:none;border-radius:8px;color:#fff;font-size:.82rem;font-weight:600;cursor:pointer;transition:var(--trans)}
.ai-btn:hover{opacity:.85;transform:translateY(-1px)}

/* ── AI CHAT VIEW ── */
#aiChatWrap{display:flex;flex-direction:column;height:100%;overflow:hidden}
#aiMessages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
#aiMessages::-webkit-scrollbar{width:4px}
#aiMessages::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
.ai-msg{display:flex;gap:12px;animation:msgIn .2s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.ai-msg.user{flex-direction:row-reverse}
.ai-msg .bubble{max-width:72%;padding:12px 16px;border-radius:16px;font-size:.88rem;line-height:1.6}
.ai-msg.user .bubble{background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;border-radius:16px 16px 4px 16px}
.ai-msg.bot .bubble{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:16px 16px 16px 4px}
.ai-msg .bubble pre{background:var(--bg2);border-radius:8px;padding:10px;overflow-x:auto;font-size:.78rem;margin-top:8px}
.ai-msg .bubble code{font-family:monospace;font-size:.82rem}
.ai-avatar{width:32px;height:32px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1rem}
.ai-avatar.bot{background:linear-gradient(135deg,var(--accent),var(--accent3))}
.ai-avatar.user{background:linear-gradient(135deg,var(--accent),var(--pink))}
.typing-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--text3);animation:blink 1.2s infinite;margin:0 2px}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
#aiInputBar{padding:16px 20px;border-top:1px solid var(--border);background:var(--bg2);display:flex;gap:10px;align-items:flex-end}
#aiInput{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:12px 16px;color:var(--text);font-size:.88rem;outline:none;resize:none;font-family:inherit;max-height:120px;line-height:1.5;transition:border .2s}
#aiInput:focus{border-color:var(--accent)}
#aiSendBtn{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent3));border:none;color:#fff;font-size:1.1rem;cursor:pointer;transition:var(--trans);flex-shrink:0;display:flex;align-items:center;justify-content:center}
#aiSendBtn:hover{opacity:.85;transform:scale(1.05)}
#aiSendBtn:disabled{opacity:.4;cursor:not-allowed;transform:none}
#aiClearBtn{height:42px;padding:0 14px;border-radius:12px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-size:.75rem;cursor:pointer;transition:var(--trans);white-space:nowrap}
#aiClearBtn:hover{border-color:var(--red);color:var(--red)}
.ai-chips{display:flex;gap:8px;flex-wrap:wrap;padding:12px 20px;border-top:1px solid var(--border);background:var(--bg2)}
.ai-chip{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-size:.75rem;cursor:pointer;transition:var(--trans)}
.ai-chip:hover{border-color:var(--accent);color:var(--accent2)}

/* ── SETTINGS VIEW ── */
.settings-wrap{display:flex;flex-direction:column;gap:20px}
.settings-section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--card-r);padding:24px}
.settings-section h3{font-size:.9rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:18px;display:flex;align-items:center;gap:8px}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)}
.settings-row:last-child{border-bottom:none;padding-bottom:0}
.settings-label{font-size:.88rem;font-weight:500}
.settings-sub{font-size:.75rem;color:var(--text3);margin-top:2px}
.settings-input{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:8px 14px;color:var(--text);font-size:.87rem;outline:none;transition:border .2s;width:220px}
.settings-input:focus{border-color:var(--accent)}
.accent-swatches{display:flex;gap:8px;flex-wrap:wrap}
.accent-swatch{width:30px;height:30px;border-radius:50%;cursor:pointer;transition:all .15s;border:3px solid transparent}
.accent-swatch.active{border-color:#fff;box-shadow:0 0 0 2px var(--accent)}
.export-btns{display:flex;gap:10px;flex-wrap:wrap}
.toggle-sw{position:relative;width:44px;height:24px;flex-shrink:0}
.toggle-sw input{opacity:0;width:0;height:0}
.toggle-sw .slider{position:absolute;inset:0;background:var(--bg3);border-radius:12px;border:1px solid var(--border);cursor:pointer;transition:.3s}
.toggle-sw .slider::before{content:'';position:absolute;left:3px;top:3px;width:16px;height:16px;border-radius:50%;background:var(--text3);transition:.3s}
.toggle-sw input:checked+.slider{background:var(--accent);border-color:var(--accent)}
.toggle-sw input:checked+.slider::before{transform:translateX(20px);background:#fff}
.firebase-status-card{padding:14px 16px;border-radius:12px;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;gap:12px;font-size:.85rem}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:var(--trans)}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:28px;width:460px;max-width:90vw;transform:translateY(20px);transition:var(--trans)}
.modal-overlay.open .modal{transform:translateY(0)}
.modal h3{font-size:1.1rem;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:8px}
.field{margin-bottom:14px}
.field label{display:block;font-size:.78rem;color:var(--text2);margin-bottom:6px;font-weight:500}
.field input,.field textarea,.field select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-size:.88rem;outline:none;transition:var(--trans);font-family:inherit}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent)}
.field textarea{resize:vertical;min-height:80px}
.modal-btns{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.btn{padding:9px 20px;border-radius:10px;border:none;font-size:.85rem;font-weight:600;cursor:pointer;transition:var(--trans)}
.btn-ghost{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--accent)}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff}
.btn-primary:hover{opacity:.85}
.btn-sm{padding:7px 14px;font-size:.78rem}

/* FAB */
.fab{position:fixed;bottom:28px;right:28px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent3));border:none;color:#fff;font-size:1.6rem;cursor:pointer;box-shadow:0 8px 24px rgba(124,106,247,.4);transition:var(--trans);z-index:50;display:flex;align-items:center;justify-content:center}
.fab:hover{transform:scale(1.1);box-shadow:0 12px 32px rgba(124,106,247,.5)}

/* TOAST */
.toast{position:fixed;bottom:90px;right:28px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 18px;font-size:.85rem;color:var(--text);z-index:2000;transform:translateY(20px);opacity:0;transition:var(--trans);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.toast.show{transform:translateY(0);opacity:1}

@media(max-width:900px){
  #sidebar{position:fixed;left:-240px;height:100%;top:0}
  #sidebar.open{left:0}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .dash-grid{grid-template-columns:1fr}
  .notes-masonry{columns:1}
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<nav id="sidebar">
  <div class="logo">
    <div class="logo-icon">⬡</div>
    <span id="appTitle">NOVA NEXUS</span>
  </div>
  <div class="nav-section">Principal</div>
  <div class="nav-item active" data-view="dashboard"><span class="nav-icon">⊞</span> Dashboard</div>
  <div class="nav-item" data-view="calendar"><span class="nav-icon">📅</span> Calendario</div>
  <div class="nav-item" data-view="notes"><span class="nav-icon">🗒️</span> Notas</div>
  <div class="nav-item" data-view="projects"><span class="nav-icon">🚀</span> Proyectos</div>
  <div class="nav-section" style="margin-top:20px">Herramientas</div>
  <div class="nav-item" data-view="ai"><span class="nav-icon">✦</span> IA Asistente</div>
  <div class="nav-item" data-view="habits"><span class="nav-icon">🔥</span> Hábitos</div>
  <div class="nav-item" data-view="settings"><span class="nav-icon">⚙️</span> Ajustes</div>
  <div class="sidebar-bottom">
    <div class="sync-status" id="syncStatus">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncLabel">Sin Firebase</span>
    </div>
    <div class="theme-toggle" id="themeToggle">
      <span id="themeIcon">☀️</span>
      <span id="themeLabel">Modo Claro</span>
    </div>
  </div>
</nav>

<!-- MAIN -->
<div id="main">
  <header id="topbar">
    <div class="greeting">
      <h2 id="greetingText">Buenas tardes ✦</h2>
      <p id="dateText"></p>
    </div>
    <div class="topbar-right">
      <div class="tb-btn" id="menuBtn" title="Menú">☰</div>
      <div class="tb-btn" title="Buscar">🔍</div>
      <div class="tb-btn" title="Notificaciones">🔔</div>
      <div class="avatar" id="avatarEl">V</div>
    </div>
  </header>
  <div id="content"></div>
</div>

<!-- FAB -->
<button class="fab" id="fab">+</button>
<div class="toast" id="toast"></div>

<!-- MODAL NOTA -->
<div class="modal-overlay" id="noteModal">
  <div class="modal">
    <h3>🗒️ Nueva Nota</h3>
    <div class="field"><label>Título</label><input id="noteTitle" placeholder="Título de la nota…"/></div>
    <div class="field"><label>Contenido</label><textarea id="noteBody" rows="4" placeholder="Escribe aquí…"></textarea></div>
    <div class="field"><label>Etiquetas (separadas por coma)</label><input id="noteTags" placeholder="idea, trabajo, personal…"/></div>
    <div class="field"><label>Color</label>
      <select id="noteColor">
        <option value="var(--accent)">Morado</option>
        <option value="var(--green)">Verde</option>
        <option value="var(--yellow)">Amarillo</option>

<script>
// ══════════════════════════════════════════════
// STATE & PERSIST
// ══════════════════════════════════════════════
const state = {
  notes:    JSON.parse(localStorage.getItem('nn_notes')    || '[]'),
  events:   JSON.parse(localStorage.getItem('nn_events')   || '[]'),
  projects: JSON.parse(localStorage.getItem('nn_projects') || '[]'),
  habits:   JSON.parse(localStorage.getItem('nn_habits')   || '[]'),
  routines: JSON.parse(localStorage.getItem('nn_routines') || '[]'),
  calDate:  new Date(),
  theme:    localStorage.getItem('nn_theme') || 'dark',
  aiHistory: JSON.parse(localStorage.getItem('nn_ai_history') || '[]'),
  settings: JSON.parse(localStorage.getItem('nn_settings') || JSON.stringify({
    username: 'Víctor',
    accentColor: '#7c6af7',
    firebaseApiKey: '',
    firebaseProjectId: '',
    autoSync: false,
    systemPrompt: 'Eres un asistente personal inteligente integrado en NOVA NEXUS. Ayudas con productividad, tareas, proyectos y organización personal. Responde siempre en español de forma concisa y útil.'
  }))
};

const save = () => {
  localStorage.setItem('nn_notes',      JSON.stringify(state.notes));
  localStorage.setItem('nn_events',     JSON.stringify(state.events));
  localStorage.setItem('nn_projects',   JSON.stringify(state.projects));
  localStorage.setItem('nn_habits',     JSON.stringify(state.habits));
  localStorage.setItem('nn_routines',   JSON.stringify(state.routines));
  localStorage.setItem('nn_ai_history', JSON.stringify(state.aiHistory.slice(-60)));
  localStorage.setItem('nn_settings',   JSON.stringify(state.settings));
  if (fb.enabled && fb.autoSync) fb.pushAll();
};

// ══════════════════════════════════════════════
// FIREBASE MODULE
// ══════════════════════════════════════════════
const fb = {
  enabled: false,
  autoSync: false,
  token: null,
  uid: null,
  projectId: null,
  apiKey: null,
  unsubscribes: [],

  get baseUrl() {
    return `https://firestore.googleapis.com/v1/projects/${this.projectId}/databases/(default)/documents`;
  },

  async init(apiKey, projectId) {
    this.apiKey = apiKey;
    this.projectId = projectId;
    setSyncStatus('syncing', 'Conectando…');
    try {
      const r = await fetch(
        `https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=${apiKey}`,
        { method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ returnSecureToken: true }) }
      );
      const d = await r.json();
      if (d.error) throw new Error(d.error.message);
      this.token = d.idToken;
      this.uid   = d.localId;
      this.enabled = true;
      this.autoSync = state.settings.autoSync;
      setSyncStatus('connected', 'Firebase activo');
      toast('✅ Firebase conectado');
      if (this.autoSync) await this.pullAll();
    } catch(e) {
      setSyncStatus('error', 'Error Firebase');
      toast('⚠️ Firebase: ' + e.message);
    }
  },

  headers() {
    return { 'Content-Type':'application/json',
             'Authorization': `Bearer ${this.token}` };
  },

  toDoc(data) {
    const fields = {};
    Object.entries(data).forEach(([k,v]) => {
      if (typeof v === 'string')  fields[k] = { stringValue: v };
      else if (typeof v === 'number') fields[k] = { integerValue: v };
      else if (typeof v === 'boolean') fields[k] = { booleanValue: v };
      else fields[k] = { stringValue: JSON.stringify(v) };
    });
    return { fields };
  },

  fromDoc(doc) {
    const out = {};
    Object.entries(doc.fields||{}).forEach(([k,v]) => {
      if (v.stringValue !== undefined) {
        try { out[k] = JSON.parse(v.stringValue); } catch { out[k] = v.stringValue; }
      } else if (v.integerValue !== undefined) out[k] = Number(v.integerValue);
      else if (v.booleanValue !== undefined) out[k] = v.booleanValue;
    });
    return out;
  },

  async pushCollection(name, arr) {
    if (!this.enabled) return;
    setSyncStatus('syncing', 'Sincronizando…');
    try {
      for (const item of arr) {
        await fetch(
          `${this.baseUrl}/users/${this.uid}/${name}/${item.id}?key=${this.apiKey}`,
          { method:'PATCH', headers: this.headers(),
            body: JSON.stringify(this.toDoc({...item, _json: JSON.stringify(item)})) }
        );
      }
      setSyncStatus('connected', 'Sincronizado ✓');
    } catch(e) { setSyncStatus('error', 'Error sync'); }
  },

  async pullCollection(name) {
    if (!this.enabled) return null;
    try {
      const r = await fetch(
        `${this.baseUrl}/users/${this.uid}/${name}?key=${this.apiKey}`,
        { headers: this.headers() }
      );
      const d = await r.json();
      if (!d.documents) return [];
      return d.documents.map(doc => {
        const f = this.fromDoc(doc);
        try { return JSON.parse(f._json || '{}'); } catch { return f; }
      });
    } catch { return null; }
  },

  async pushAll() {
    await this.pushCollection('notes',    state.notes);
    await this.pushCollection('events',   state.events);
    await this.pushCollection('projects', state.projects);
    await this.pushCollection('habits',   state.habits);
    await this.pushCollection('routines', state.routines);
  },

  async pullAll() {
    setSyncStatus('syncing', 'Descargando…');
    const [notes, events, projects, habits, routines] = await Promise.all([
      this.pullCollection('notes'),
      this.pullCollection('events'),
      this.pullCollection('projects'),
      this.pullCollection('habits'),
      this.pullCollection('routines')
    ]);
    let changed = false;
    if (notes    && notes.length)    { state.notes    = notes;    changed = true; }
    if (events   && events.length)   { state.events   = events;   changed = true; }
    if (projects && projects.length) { state.projects = projects; changed = true; }
    if (habits   && habits.length)   { state.habits   = habits;   changed = true; }
    if (routines && routines.length) { state.routines = routines; changed = true; }
    if (changed) { save(); toast('☁️ Datos sincronizados desde Firebase'); }
    setSyncStatus('connected', 'Sincronizado ✓');
  }
};

function setSyncStatus(state, label) {
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLabel');
  if (!dot||!lbl) return;
  dot.className = 'sync-dot ' + state;
  lbl.textContent = label;
}

// ══════════════════════════════════════════════
// THEME & ACCENT
// ══════════════════════════════════════════════
const ACCENT_PRESETS = [
  { name:'Morado', h:'#7c6af7', a:'#a78bfa', b:'#38bdf8' },
  { name:'Rosa',   h:'#ec4899', a:'#f472b6', b:'#fb7185' },
  { name:'Verde',  h:'#10b981', a:'#34d399', b:'#6ee7b7' },
  { name:'Naranja',h:'#f59e0b', a:'#fbbf24', b:'#fd9a00' },
  { name:'Azul',   h:'#3b82f6', a:'#60a5fa', b:'#38bdf8' },
  { name:'Rojo',   h:'#ef4444', a:'#f87171', b:'#fb923c' },
];

function applyAccent(hex) {
  document.documentElement.style.setProperty('--accent', hex);
  const preset = ACCENT_PRESETS.find(p => p.h === hex);
  if (preset) {
    document.documentElement.style.setProperty('--accent2', preset.a);
    document.documentElement.style.setProperty('--accent3', preset.b);
  }
  state.settings.accentColor = hex;
}

const applyTheme = t => {
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('themeIcon').textContent  = t === 'dark' ? '☀️' : '🌙';
  document.getElementById('themeLabel').textContent = t === 'dark' ? 'Modo Claro' : 'Modo Oscuro';
  localStorage.setItem('nn_theme', t);
};
applyTheme(state.theme);
applyAccent(state.settings.accentColor || '#7c6af7');
document.getElementById('themeToggle').addEventListener('click', () => {
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  applyTheme(state.theme);
});

// ══════════════════════════════════════════════
// USERNAME / AVATAR
// ══════════════════════════════════════════════
function applyUsername(name) {
  const initial = (name||'V')[0].toUpperCase();
  document.getElementById('avatarEl').textContent = initial;
  const greet = document.getElementById('greetingText');
  if (greet) {
    const h = new Date().getHours();
    const g = h<12?'Buenos días':h<18?'Buenas tardes':'Buenas noches';
    greet.textContent = `${g}, ${name} ✦`;
  }
}

// ══════════════════════════════════════════════
// GREETING
// ══════════════════════════════════════════════
const initGreeting = () => {
  const h = new Date().getHours();
  const g = h<12?'Buenos días':h<18?'Buenas tardes':'Buenas noches';
  const name = state.settings.username || 'Víctor';
  document.getElementById('greetingText').textContent = `${g}, ${name} ✦`;
  const d = new Date().toLocaleDateString('es-MX',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  document.getElementById('dateText').textContent = d.charAt(0).toUpperCase() + d.slice(1);
};
initGreeting();

// ══════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════
const toast = msg => {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
};

// ══════════════════════════════════════════════
// CALENDAR (widget)
// ══════════════════════════════════════════════
const months = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

const renderCalendar = () => {
  const d=state.calDate, y=d.getFullYear(), m=d.getMonth();
  const calMonthEl = document.getElementById('calMonth');
  if (!calMonthEl) return;
  calMonthEl.textContent = `${months[m]} ${y}`;
  const first=new Date(y,m,1).getDay(), days=new Date(y,m+1,0).getDate();
  const prevDays=new Date(y,m,0).getDate();
  const grid=document.getElementById('calGrid');
  if (!grid) return;
  grid.innerHTML='';
  const today=new Date();
  const eventDays=new Set(state.events.filter(e=>{
    const ed=new Date(e.date+'T12:00:00');
    return ed.getFullYear()===y && ed.getMonth()===m;
  }).map(e=>new Date(e.date+'T12:00:00').getDate()));
  for(let i=0;i<first;i++){
    const el=document.createElement('div');
    el.className='cal-day other-month';
    el.textContent=prevDays-first+1+i;
    grid.appendChild(el);
  }
  for(let i=1;i<=days;i++){
    const el=document.createElement('div');
    el.className='cal-day';
    if(i===today.getDate()&&m===today.getMonth()&&y===today.getFullYear()) el.classList.add('today');
    if(eventDays.has(i)) el.classList.add('has-event');
    el.textContent=i;
    el.addEventListener('click',()=>selectDay(y,m,i));
    grid.appendChild(el);
  }
  const remaining=42-first-days;
  for(let i=1;i<=remaining;i++){
    const el=document.createElement('div');
    el.className='cal-day other-month';
    el.textContent=i;
    grid.appendChild(el);
  }
  renderTodayEvents();
};

const selectDay=(y,m,d)=>{
  const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const evDate=document.getElementById('evDate');
  if(evDate) evDate.value=ds;
  openModal('eventModal');
};

const renderTodayEvents=()=>{
  const today=new Date().toISOString().split('T')[0];
  const todayEvs=state.events.filter(e=>e.date===today).sort((a,b)=>a.start.localeCompare(b.start));
  const list=document.getElementById('eventsList');
  if(!list) return;
  list.innerHTML='';
  if(!todayEvs.length){
    list.innerHTML='<div style="text-align:center;color:var(--text3);font-size:.82rem;padding:12px">Sin eventos hoy</div>';
    return;
  }
  todayEvs.forEach(ev=>{
    const el=document.createElement('div');
    el.className='event-item';
    el.style.setProperty('--c',ev.color||'var(--accent)');
    el.innerHTML=`<div class="event-time">${ev.start}${ev.end?'–'+ev.end:''}</div><div class="event-name">${ev.title}</div>`;
    list.appendChild(el);
  });
};

const calPrevBtn=document.getElementById('calPrev');
const calNextBtn=document.getElementById('calNext');
if(calPrevBtn) calPrevBtn.addEventListener('click',()=>{state.calDate.setMonth(state.calDate.getMonth()-1);renderCalendar();});
if(calNextBtn) calNextBtn.addEventListener('click',()=>{state.calDate.setMonth(state.calDate.getMonth()+1);renderCalendar();});

// ══════════════════════════════════════════════
// NOTES
// ══════════════════════════════════════════════
const renderNotes=()=>{
  const c=document.getElementById('notesMasonry');
  if(!c) return;
  c.innerHTML='';
  const statNotes=document.getElementById('statNotes');
  if(statNotes) statNotes.textContent=state.notes.length;
  const sorted=[...state.notes].sort((a,b)=>b.pinned-a.pinned);
  if(!sorted.length){
    c.innerHTML='<div style="color:var(--text3);font-size:.85rem;text-align:center;padding:20px">No hay notas aún. ¡Crea una!</div>';
    return;
  }
  sorted.forEach((n,i)=>{
    const el=document.createElement('div');
    el.className='note-card'+(n.pinned?' pinned':'');
    el.innerHTML=`
      <div class="note-color" style="background:${n.color}"></div>
      <div class="note-title">${n.title||'Sin título'}</div>
      <div class="note-body">${n.body||''}</div>
      ${n.tags?.length?`<div class="note-tags">${n.tags.map(t=>`<span class="note-tag">${t}</span>`).join('')}</div>`:''}
    `;
    el.addEventListener('click',()=>{
      const idx=state.notes.findIndex(x=>x.id===n.id);
      if(idx>=0){state.notes[idx].pinned=!state.notes[idx].pinned;save();renderNotes();toast(state.notes[idx].pinned?'📌 Nota anclada':'Nota desanclada');}
    });
    c.appendChild(el);
  });
};

// ══════════════════════════════════════════════
// PROJECTS
// ══════════════════════════════════════════════
const renderProjects=()=>{
  const c=document.getElementById('projectsList');
  if(!c) return;
  c.innerHTML='';
  const statProjects=document.getElementById('statProjects');
  if(statProjects) statProjects.textContent=state.projects.filter(p=>p.status==='active').length;
  if(!state.projects.length){
    c.innerHTML='<div style="color:var(--text3);font-size:.85rem;text-align:center;padding:20px">Sin proyectos. ¡Comienza uno!</div>';
    return;
  }
  state.projects.forEach(p=>{
    const pct=p.tasks?.length?Math.round(p.tasks.filter(t=>t.done).length/p.tasks.length*100):0;
    const badges={active:'badge-active',pause:'badge-pause',idea:'badge-idea'};
    const labels={active:'Activo',pause:'Pausado',idea:'Idea'};
    const el=document.createElement('div');
    el.className='project-item';
    el.innerHTML=`
      <div class="proj-top"><div class="proj-name">${p.name}</div><span class="proj-badge ${badges[p.status]}">${labels[p.status]}</span></div>
      <div class="proj-desc">${p.desc||''}</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="proj-footer"><span>${p.tasks?.length||0} tareas</span><span>${pct}%</span></div>
    `;
    c.appendChild(el);
  });
};

// MODALS
// ══════════════════════════════════════════════
const openModal=id=>document.getElementById(id)?.classList.add('open');
const closeModal=id=>document.getElementById(id)?.classList.remove('open');

document.getElementById('noteCancel').addEventListener('click',()=>closeModal('noteModal'));

  const t=document.getElementById('noteTitle').value.trim();
  if(!t){toast('⚠️ Agrega un título');return;}
  state.notes.unshift({id:Date.now(),title:t,body:document.getElementById('noteBody').value.trim(),
    tags:document.getElementById('noteTags').value.split(',').map(s=>s.trim()).filter(Boolean),
    color:document.getElementById('noteColor').value,pinned:false,createdAt:new Date().toISOString()});
  save();renderNotes();closeModal('noteModal');
  ['noteTitle','noteBody','noteTags'].forEach(id=>document.getElementById(id).value='');

});

document.getElementById('evCancel').addEventListener('click',()=>closeModal('eventModal'));
document.getElementById('evSave').addEventListener('click',()=>{
  const t=document.getElementById('evTitle').value.trim();
  if(!t){toast('⚠️ Agrega un título');return;}
  state.events.push({id:Date.now(),title:t,date:document.getElementById('evDate').value,
    start:document.getElementById('evStart').value,end:document.getElementById('evEnd').value,
    color:document.getElementById('evColor').value});
  save();renderCalendar();closeModal('eventModal');
  document.getElementById('evTitle').value='';
  toast('✅ Evento guardado');
});

// Project modal
document.getElementById('projCancel').addEventListener('click',()=>closeModal('projModal'));
document.getElementById('projSave').addEventListener('click',()=>{
  const n=document.getElementById('projName').value.trim();
  if(!n){toast('⚠️ Agrega un nombre');return;}
  state.projects.unshift({id:Date.now(),name:n,desc:document.getElementById('projDesc').value.trim(),
    status:document.getElementById('projStatus').value,tasks:[],createdAt:new Date().toISOString()});
  save();renderProjects();closeModal('projModal');
  document.getElementById('projName').value='';
  document.getElementById('projDesc').value='';
  toast('✅ Proyecto creado');
});

document.getElementById('fab').addEventListener('click',()=>openModal('noteModal'));

// ══════════════════════════════════════════════
// NAV
// ══════════════════════════════════════════════
document.querySelectorAll('.nav-item,[data-view]').forEach(el=>{
  el.addEventListener('click',()=>{
    const v=el.dataset.view;
    if(!v) return;
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    document.querySelector(`.nav-item[data-view="${v}"]`)?.classList.add('active');
    if(v==='dashboard')  renderDashboard();
    else if(v==='projects') renderProjectsView();
    else if(v==='notes') renderNotesView();
    else if(v==='calendar') renderCalendarView();
    else if(v==='habits') renderHabitsView();
    else if(v==='ai') renderAIView();
    else if(v==='settings') renderSettingsView();
  });
});

document.getElementById('menuBtn').addEventListener('click',()=>{
  document.getElementById('sidebar').classList.toggle('open');
});

const updateStats=()=>{
  const el=document.getElementById('statTasks');
  if(el) el.textContent=state.projects.reduce((a,p)=>a+(p.tasks?.filter(t=>!t.done).length||0),0);
};

const buildAppContext=()=>{
  const today=new Date().toISOString().split('T')[0];
  const activeProjects=state.projects.filter(p=>p.status==='active');
  const pendingTasks=state.projects.flatMap(p=>(p.tasks||[]).filter(t=>!t.done).map(t=>t.title));
  const recentNotes=state.notes.slice(0,3).map(n=>n.title);
  const habitsToday=(state.habits||[]).filter(h=>(h.logs||[]).includes(today)).length;
  return `Proyectos activos: ${activeProjects.map(p=>p.name).join(', ')||'ninguno'}.
Tareas pendientes (${pendingTasks.length}): ${pendingTasks.slice(0,5).join(', ')||'ninguna'}.
Notas recientes: ${recentNotes.join(', ')||'ninguna'}.
Hábitos completados hoy: ${habitsToday}/${(state.habits||[]).length}.`;
};

const appendMessage=(role,content,scroll=true)=>{
  const msgs=document.getElementById('aiMessages');
  if(!msgs) return;
  // remove empty state
  const empty=msgs.querySelector('[style*="3rem"]');
  if(empty) empty.remove();

  const wrap=document.createElement('div');
  wrap.className=`ai-msg ${role}`;
  const avatar=role==='user'
    ? `<div class="ai-avatar user">${(state.settings.username||'V')[0].toUpperCase()}</div>`
    : `<div class="ai-avatar bot">✦</div>`;
  const formatted=content
    .replace(/```(\w*)\n?([\s\S]*?)```/g,'<pre><code>$2</code></pre>')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/\n/g,'<br>');
  wrap.innerHTML=`${role==='bot'?avatar:''}<div class="bubble">${formatted}</div>${role==='user'?avatar:''}`;
  msgs.appendChild(wrap);
  if(scroll) msgs.scrollTop=msgs.scrollHeight;
};

const sendAIMessage=async()=>{
  const input=document.getElementById('aiInput');
  const sendBtn=document.getElementById('aiSendBtn');
  if(!input||!sendBtn) return;
  const text=input.value.trim();
  if(!text) return;
  input.value='';input.style.height='auto';
  appendMessage('user',text);
  state.aiHistory.push({role:'user',content:text});

  // typing indicator
  const msgs=document.getElementById('aiMessages');
  const typingEl=document.createElement('div');
  typingEl.className='ai-msg bot';typingEl.id='typingIndicator';
  typingEl.innerHTML=`<div class="ai-avatar bot">✦</div><div class="bubble"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>`;
  msgs?.appendChild(typingEl);
  msgs.scrollTop=msgs.scrollHeight;
  sendBtn.disabled=true;

  try {
    const systemMsg=state.settings.systemPrompt+'\n\nContexto actual:\n'+buildAppContext();
    const messages=state.aiHistory.map(m=>({role:m.role==='bot'?'assistant':'user',content:m.content}));
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1000,
        system:systemMsg,
        messages
      })
    });
    const data=await res.json();
    typingEl.remove();
    const reply=data.content?.find(c=>c.type==='text')?.text||'Sin respuesta.';
    appendMessage('bot',reply);
    state.aiHistory.push({role:'bot',content:reply});
    save();
  } catch(e) {
    typingEl.remove();
    appendMessage('bot','⚠️ Error de conexión. Verifica tu red e inténtalo de nuevo.');
  }
  sendBtn.disabled=false;
  document.getElementById('aiInput')?.focus();
};

  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
    <div style="font-size:1.3rem;font-weight:800;display:flex;align-items:center;gap:10px"><span>🚀</span> Proyectos</div>
    <div style="display:flex;gap:10px;align-items:center">
      <div style="display:flex;gap:6px" id="filterBtns">
        ${['todos','active','pause','idea'].map((f,i)=>
          `<button class="filter-btn${i===0?' active':''}" data-filter="${f}" style="padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:${i===0?'var(--accent)':'var(--bg3)'};color:${i===0?'#fff':'var(--text2)'};font-size:.78rem;cursor:pointer;transition:all .2s">${{todos:'Todos',active:'Activos',pause:'Pausados',idea:'Ideas'}[f]}</button>`
        ).join('')}
      </div>
      <button class="btn btn-primary" id="newProjBtn" style="padding:8px 16px;font-size:.82rem">+ Nuevo</button>
    </div>
  </div>
  <div id="projViewList" style="display:flex;flex-direction:column;gap:16px;margin-top:8px"></div>`;

  renderProjCards('todos');
  document.getElementById('newProjBtn').addEventListener('click',()=>openModal('projModal'));
  document.getElementById('filterBtns').addEventListener('click',e=>{
    const btn=e.target.closest('.filter-btn');
    if(!btn) return;
    document.querySelectorAll('.filter-btn').forEach(b=>{b.style.background='var(--bg3)';b.style.color='var(--text2)';b.classList.remove('active');});
    btn.style.background='var(--accent)';btn.style.color='#fff';btn.classList.add('active');
    renderProjCards(btn.dataset.filter);
  });
};

const renderProjCards=(filter)=>{
  const list=document.getElementById('projViewList');
  if(!list) return;
  const filtered=filter==='todos'?state.projects:state.projects.filter(p=>p.status===filter);
  if(!filtered.length){
    list.innerHTML=`<div style="text-align:center;color:var(--text3);padding:60px;font-size:.9rem">Sin proyectos aquí. ¡Crea uno!</div>`;
    return;
  }
  list.innerHTML='';
  filtered.forEach(p=>{
    const pct=p.tasks?.length?Math.round(p.tasks.filter(t=>t.done).length/p.tasks.length*100):0;
    const done=p.tasks?.filter(t=>t.done).length||0;
    const total=p.tasks?.length||0;
    const badges={active:'badge-active',pause:'badge-pause',idea:'badge-idea'};
    const labels={active:'Activo',pause:'Pausado',idea:'Idea'};
    const card=document.createElement('div');
    card.className='proj-full-card';card.dataset.id=p.id;
    card.innerHTML=`
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap">
        <div style="flex:1;min-width:200px">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
            <span style="font-size:1.05rem;font-weight:700">${p.name}</span>
            <span class="proj-badge ${badges[p.status]}">${labels[p.status]}</span>
          </div>
          ${p.desc?`<div style="font-size:.82rem;color:var(--text2);margin-bottom:12px">${p.desc}</div>`:''}
          <div class="progress-bar" style="margin-bottom:6px"><div class="progress-fill" style="width:${pct}%"></div></div>
          <div style="font-size:.75rem;color:var(--text3);margin-bottom:14px">${done} de ${total} tareas · ${pct}%</div>
        </div>
        <div style="display:flex;gap:8px;flex-shrink:0">
          <button class="tb-btn ai-gen-btn" data-id="${p.id}" title="Generar tareas con IA" style="width:auto;padding:0 12px;font-size:.75rem;gap:6px;display:flex;align-items:center;border-radius:10px">✦ IA</button>
          <button class="tb-btn del-proj-btn" data-id="${p.id}" title="Eliminar" style="color:var(--red)">🗑</button>
        </div>
      </div>
      <div class="task-list" id="tasks-${p.id}"></div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <input class="task-input" data-id="${p.id}" placeholder="Nueva tarea…" style="flex:1;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:8px 12px;color:var(--text);font-size:.83rem;outline:none"/>
        <button class="btn btn-primary add-task-btn" data-id="${p.id}" style="padding:8px 14px;font-size:.82rem">+</button>
      </div>
      <div class="ai-response" id="ai-${p.id}" style="display:none;margin-top:14px;padding:14px;background:linear-gradient(135deg,rgba(124,106,247,.1),rgba(56,189,248,.05));border:1px solid rgba(124,106,247,.3);border-radius:12px;font-size:.83rem;color:var(--text2);line-height:1.6"></div>`;
    list.appendChild(card);
    renderTaskList(p);
    card.querySelector('.add-task-btn').addEventListener('click',()=>addTask(p.id,card));
    card.querySelector('.task-input').addEventListener('keydown',e=>{if(e.key==='Enter')addTask(p.id,card);});
    card.querySelector('.del-proj-btn').addEventListener('click',()=>deleteProject(p.id));
    card.querySelector('.ai-gen-btn').addEventListener('click',()=>aiGenerateTasks(p));
  });
};

const renderTaskList=p=>{
  const container=document.getElementById(`tasks-${p.id}`);
  if(!container) return;
  container.innerHTML='';
  if(!p.tasks?.length){container.innerHTML=`<div style="font-size:.8rem;color:var(--text3);padding:8px 0">Sin tareas aún.</div>`;return;}
  p.tasks.forEach((t,i)=>{
    const row=document.createElement('div');
    row.className='task-row';
    row.innerHTML=`
      <label style="display:flex;align-items:center;gap:10px;cursor:pointer;flex:1">
        <input type="checkbox" ${t.done?'checked':''} data-pid="${p.id}" data-idx="${i}" style="width:16px;height:16px;accent-color:var(--accent);cursor:pointer"/>
        <span style="font-size:.85rem;${t.done?'text-decoration:line-through;color:var(--text3)':''}">${t.title}</span>
      </label>
      <button class="del-task-btn" data-pid="${p.id}" data-idx="${i}" style="opacity:0;background:none;border:none;color:var(--red);cursor:pointer;font-size:.9rem;padding:4px;transition:opacity .2s">✕</button>`;
    row.querySelector('input[type=checkbox]').addEventListener('change',e=>toggleTask(p.id,i,e.target.checked));
    row.querySelector('.del-task-btn').addEventListener('click',()=>deleteTask(p.id,i));
    row.addEventListener('mouseenter',()=>row.querySelector('.del-task-btn').style.opacity='1');
    row.addEventListener('mouseleave',()=>row.querySelector('.del-task-btn').style.opacity='0');
    container.appendChild(row);
  });
};

const addTask=(pid,card)=>{
  const input=card.querySelector(`.task-input[data-id="${pid}"]`);
  const title=input.value.trim();if(!title) return;
  const p=state.projects.find(p=>p.id==pid);if(!p) return;
  if(!p.tasks) p.tasks=[];
  p.tasks.push({title,done:false});
  save();renderTaskList(p);updateProjProgress(p);input.value='';
};

const toggleTask=(pid,idx,done)=>{
  const p=state.projects.find(p=>p.id==pid);if(!p) return;
  p.tasks[idx].done=done;save();renderTaskList(p);updateProjProgress(p);
  if(done) toast('✅ Tarea completada');
};

const deleteTask=(pid,idx)=>{
  const p=state.projects.find(p=>p.id==pid);if(!p) return;
  p.tasks.splice(idx,1);save();renderTaskList(p);updateProjProgress(p);
};

const deleteProject=pid=>{
  if(!confirm('¿Eliminar este proyecto?')) return;
  state.projects=state.projects.filter(p=>p.id!=pid);
  save();renderProjCards(document.querySelector('.filter-btn.active')?.dataset.filter||'todos');
  toast('🗑 Proyecto eliminado');
};

const updateProjProgress=p=>{
  const pct=p.tasks?.length?Math.round(p.tasks.filter(t=>t.done).length/p.tasks.length*100):0;
  const fill=document.querySelector(`#tasks-${p.id}`)?.closest('.proj-full-card')?.querySelector('.progress-fill');
  if(fill) fill.style.width=pct+'%';
};

// ══════════════════════════════════════════════
// NOTES VIEW (full)
// ══════════════════════════════════════════════
const NOTE_COLORS=[
  {label:'Morado',val:'var(--accent)'},{label:'Verde',val:'var(--green)'},
  {label:'Amarillo',val:'var(--yellow)'},{label:'Rosa',val:'var(--pink)'},
  {label:'Azul',val:'var(--accent3)'},{label:'Rojo',val:'var(--red)'}
];
let notesFilter={color:'all',tag:'all',search:'',pinned:false};
let currentLayout='masonry';

const renderNotesView=()=>{
  document.getElementById('content').style.padding='28px';
  document.getElementById('content').style.overflow='auto';
  document.getElementById('content').innerHTML=`
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">
    <div style="font-size:1.3rem;font-weight:800;display:flex;align-items:center;gap:10px"><span>🗒️</span> Notas</div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <input id="notesSearch" placeholder="🔍 Buscar notas…" style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:8px 14px;color:var(--text);font-size:.83rem;outline:none;width:200px"/>
      <button class="nf-btn" id="pinFilter" style="padding:7px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);font-size:.8rem;cursor:pointer">📌 Ancladas</button>
      <button class="btn btn-primary" id="newNoteViewBtn" style="padding:8px 16px;font-size:.82rem">+ Nueva nota</button>
    </div>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px" id="colorFilters">
    <button class="nf-btn nf-active" data-color="all" style="padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--accent);color:#fff;font-size:.75rem;cursor:pointer">Todas</button>
    ${NOTE_COLORS.map(c=>`<button class="nf-btn" data-color="${c.val}" style="padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);font-size:.75rem;cursor:pointer;display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:50%;background:${c.val};display:inline-block"></span>${c.label}</button>`).join('')}
  </div>
  <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px" id="tagFilters"></div>
  <div id="notesViewContainer"></div>`;

  document.getElementById('notesSearch').addEventListener('input',e=>{notesFilter.search=e.target.value.toLowerCase();renderFilteredNotes();});
  document.getElementById('pinFilter').addEventListener('click',()=>{
    notesFilter.pinned=!notesFilter.pinned;
    const btn=document.getElementById('pinFilter');
    btn.style.background=notesFilter.pinned?'var(--accent)':'var(--bg2)';
    btn.style.color=notesFilter.pinned?'#fff':'var(--text2)';
    renderFilteredNotes();
  });
  document.getElementById('colorFilters').addEventListener('click',e=>{
    const btn=e.target.closest('[data-color]');if(!btn) return;
    notesFilter.color=btn.dataset.color;
    document.querySelectorAll('#colorFilters [data-color]').forEach(b=>{b.style.background='var(--bg2)';b.style.color='var(--text2)';});
    btn.style.background='var(--accent)';btn.style.color='#fff';
    renderFilteredNotes();
  });
  document.getElementById('newNoteViewBtn').addEventListener('click',()=>openNoteEditor(null));
  renderTagFilters();renderFilteredNotes('masonry');
};

const renderTagFilters=()=>{
  const tf=document.getElementById('tagFilters');if(!tf) return;
  const allTags=[...new Set(state.notes.flatMap(n=>n.tags||[]))];
  tf.innerHTML='';if(!allTags.length) return;
  [['all','# Todo'],...allTags.map(t=>[t,'# '+t])].forEach(([tag,label])=>{
    const b=document.createElement('button');b.dataset.tag=tag;b.textContent=label;
    b.style.cssText=`padding:4px 12px;border-radius:20px;border:1px solid ${notesFilter.tag===tag?'var(--accent)':'var(--border)'};background:${notesFilter.tag===tag?'rgba(124,106,247,.2)':'var(--bg2)'};color:${notesFilter.tag===tag?'var(--accent2)':'var(--text3)'};font-size:.72rem;cursor:pointer`;
    b.addEventListener('click',()=>{notesFilter.tag=tag;renderTagFilters();renderFilteredNotes();});
    tf.appendChild(b);
  });
};

const getFilteredNotes=()=>[...state.notes].sort((a,b)=>b.pinned-a.pinned).filter(n=>{
  if(notesFilter.pinned&&!n.pinned) return false;
  if(notesFilter.color!=='all'&&n.color!==notesFilter.color) return false;
  if(notesFilter.tag!=='all'&&!(n.tags||[]).includes(notesFilter.tag)) return false;
  if(notesFilter.search&&!`${n.title} ${n.body}`.toLowerCase().includes(notesFilter.search)) return false;
  return true;
});

const renderFilteredNotes=(layoutOverride)=>{
  if(layoutOverride) currentLayout=layoutOverride;
  const container=document.getElementById('notesViewContainer');if(!container) return;
  const notes=getFilteredNotes();
  if(!notes.length){container.innerHTML=`<div style="text-align:center;padding:60px;color:var(--text3)">Sin notas que coincidan.</div>`;return;}
  container.style.cssText=currentLayout==='masonry'?'columns:3;gap:16px':'display:flex;flex-direction:column;gap:10px';
  container.innerHTML='';
  notes.forEach(n=>container.appendChild(buildNoteCard(n,currentLayout==='list')));
};

const buildNoteCard=(n,listMode)=>{
  const el=document.createElement('div');
  el.style.cssText=listMode
    ?`break-inside:avoid;background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px 20px;cursor:pointer;transition:all .2s;display:flex;align-items:flex-start;gap:16px;border-left:4px solid ${n.color}`
    :'break-inside:avoid;margin-bottom:16px;background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;cursor:pointer;transition:all .2s;position:relative';
  const hl=t=>notesFilter.search?t.replace(new RegExp(`(${notesFilter.search})`,'gi'),'<mark style="background:rgba(124,106,247,.3);border-radius:3px;padding:0 2px">$1</mark>'):t;
  el.innerHTML=`
    ${!listMode?`<div style="height:4px;border-radius:4px;background:${n.color};margin-bottom:12px"></div>`:''}
    <div style="flex:1;min-width:0">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">${n.pinned?'<span>📌</span>':''}<span style="font-size:.93rem;font-weight:700">${hl(n.title||'Sin título')}</span></div>
      ${n.body?`<div style="font-size:.81rem;color:var(--text2);line-height:1.55;margin-bottom:10px">${hl(n.body)}</div>`:''}
      ${(n.tags||[]).length?`<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px">${n.tags.map(t=>`<span style="font-size:.65rem;padding:2px 8px;border-radius:20px;background:var(--bg3);color:var(--text3);border:1px solid var(--border)">#${t}</span>`).join('')}</div>`:''}
      <div style="font-size:.7rem;color:var(--text3)">${new Date(n.createdAt).toLocaleDateString('es-MX',{day:'numeric',month:'short',year:'numeric'})}</div>
    </div>
    <div class="note-actions" style="display:flex;gap:6px;${listMode?'flex-shrink:0':'position:absolute;top:10px;right:10px;opacity:0;transition:opacity .2s'}">
      <button data-action="pin" data-id="${n.id}" style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:5px 8px;cursor:pointer;color:var(--text2);font-size:.8rem">📌</button>
      <button data-action="edit" data-id="${n.id}" style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:5px 8px;cursor:pointer;color:var(--text2);font-size:.8rem">✏️</button>
      <button data-action="ai" data-id="${n.id}" style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:5px 8px;cursor:pointer;color:var(--accent2);font-size:.8rem">✦</button>
      <button data-action="del" data-id="${n.id}" style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:5px 8px;cursor:pointer;color:var(--red);font-size:.8rem">🗑</button>
    </div>`;
  if(!listMode){
    el.addEventListener('mouseenter',()=>el.querySelector('.note-actions').style.opacity='1');
    el.addEventListener('mouseleave',()=>el.querySelector('.note-actions').style.opacity='0');
  }
  el.querySelector('[data-action=pin]').addEventListener('click',e=>{e.stopPropagation();toggleNotePin(n.id);});
  el.querySelector('[data-action=edit]').addEventListener('click',e=>{e.stopPropagation();openNoteEditor(n.id);});
  el.querySelector('[data-action=del]').addEventListener('click',e=>{e.stopPropagation();deleteNote(n.id);});
  el.querySelector('[data-action=ai]').addEventListener('click',e=>{e.stopPropagation();aiSummarizeNote(n);});
  el.addEventListener('mouseenter',()=>{el.style.borderColor='rgba(124,106,247,.5)';el.style.transform='translateY(-2px)';});
  el.addEventListener('mouseleave',()=>{el.style.borderColor='var(--border)';el.style.transform='';});
  return el;
};

const toggleNotePin=id=>{const n=state.notes.find(n=>n.id==id);if(!n) return;n.pinned=!n.pinned;save();renderFilteredNotes();renderTagFilters();toast(n.pinned?'📌 Anclada':'Desanclada');};
const deleteNote=id=>{if(!confirm('¿Eliminar?')) return;state.notes=state.notes.filter(n=>n.id!=id);save();renderFilteredNotes();renderTagFilters();toast('🗑 Eliminada');};

const openNoteEditor=(id)=>{
  const n=id?state.notes.find(n=>n.id==id):null;
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);z-index:2000;display:flex;align-items:center;justify-content:center';
  overlay.innerHTML=`
  <div style="background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:30px;width:560px;max-width:95vw;max-height:90vh;overflow-y:auto">
    <div style="display:flex;justify-content:space-between;margin-bottom:20px">
      <h3 style="font-size:1.1rem;font-weight:700">${n?'✏️ Editar':'🗒️ Nueva nota'}</h3>
      <button id="closeEd" style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:6px 10px;cursor:pointer;color:var(--text2)">✕</button>
    </div>
    <div style="margin-bottom:12px"><label style="font-size:.75rem;color:var(--text2);display:block;margin-bottom:5px">Título</label>
    <input id="edTitle" value="${n?.title||''}" placeholder="Título…" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-size:.95rem;outline:none"/></div>
    <div style="margin-bottom:12px"><label style="font-size:.75rem;color:var(--text2);display:block;margin-bottom:5px">Contenido</label>
    <textarea id="edBody" rows="8" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:.88rem;outline:none;resize:vertical;font-family:inherit;line-height:1.6">${n?.body||''}</textarea></div>
    <div style="margin-bottom:12px"><label style="font-size:.75rem;color:var(--text2);display:block;margin-bottom:5px">Etiquetas</label>
    <input id="edTags" value="${(n?.tags||[]).join(', ')}" placeholder="idea, trabajo…" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-size:.85rem;outline:none"/></div>
    <div style="margin-bottom:20px"><label style="font-size:.75rem;color:var(--text2);display:block;margin-bottom:8px">Color</label>
    <div style="display:flex;gap:8px;flex-wrap:wrap" id="edColorPicker">
      ${NOTE_COLORS.map(c=>`<div data-cv="${c.val}" title="${c.label}" style="width:28px;height:28px;border-radius:50%;background:${c.val};cursor:pointer;border:3px solid ${(n?.color||'var(--accent)')===c.val?'#fff':'transparent'};transition:border .15s;box-shadow:${(n?.color||'var(--accent)')===c.val?'0 0 0 2px var(--accent)':'none'}"></div>`).join('')}
    </div></div>
    <div style="display:flex;justify-content:flex-end;gap:10px">
      <button id="edCancel" class="btn btn-ghost">Cancelar</button>
      <button id="edSave" class="btn btn-primary">💾 Guardar</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  document.getElementById('edTitle').focus();
  let selColor=n?.color||'var(--accent)';
  document.getElementById('edColorPicker').addEventListener('click',e=>{
    const dot=e.target.closest('[data-cv]');if(!dot) return;
    selColor=dot.dataset.cv;
    document.querySelectorAll('#edColorPicker [data-cv]').forEach(d=>{d.style.border='3px solid transparent';d.style.boxShadow='none';});
    dot.style.border='3px solid #fff';dot.style.boxShadow='0 0 0 2px var(--accent)';
  });
  const close=()=>document.body.removeChild(overlay);
  document.getElementById('closeEd').addEventListener('click',close);
  document.getElementById('edCancel').addEventListener('click',close);
  overlay.addEventListener('click',e=>{if(e.target===overlay)close();});
  document.getElementById('edSave').addEventListener('click',()=>{
    const title=document.getElementById('edTitle').value.trim();
    if(!title){toast('⚠️ Agrega un título');return;}
    const tags=document.getElementById('edTags').value.split(',').map(s=>s.trim()).filter(Boolean);
    const body=document.getElementById('edBody').value.trim();
    if(n){const idx=state.notes.findIndex(x=>x.id==n.id);state.notes[idx]={...state.notes[idx],title,body,tags,color:selColor};}
    else state.notes.unshift({id:Date.now(),title,body,tags,color:selColor,pinned:false,createdAt:new Date().toISOString()});
    save();close();renderFilteredNotes();renderTagFilters();toast(n?'✅ Actualizada':'✅ Guardada');
  });
};

const aiSummarizeNote=async(n)=>{
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);z-index:2000;display:flex;align-items:center;justify-content:center';
  overlay.innerHTML=`<div style="background:var(--bg2);border:1px solid rgba(124,106,247,.4);border-radius:20px;padding:28px;width:500px;max-width:95vw">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px"><span style="font-size:1.4rem">✦</span><h3 style="font-size:1rem;font-weight:700">IA — Resumen de nota</h3></div>
    <div id="aiSumBox" style="font-size:.88rem;color:var(--text2);line-height:1.7;min-height:60px"><span style="color:var(--accent)">Analizando…</span></div>
    <div style="display:flex;justify-content:flex-end;margin-top:20px"><button id="closeSum" class="btn btn-ghost">Cerrar</button></div>
  </div>`;
  document.body.appendChild(overlay);
  document.getElementById('closeSum').addEventListener('click',()=>document.body.removeChild(overlay));
  overlay.addEventListener('click',e=>{if(e.target===overlay)document.body.removeChild(overlay);});
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,messages:[{role:'user',content:`Resume la siguiente nota en español con 3-5 puntos clave. Título: "${n.title}". Contenido: "${n.body}"`}]})});
    const data=await res.json();
    const text=data.content?.find(c=>c.type==='text')?.text||'Sin respuesta.';
    document.getElementById('aiSumBox').innerHTML=text.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  }catch{document.getElementById('aiSumBox').innerHTML='<span style="color:var(--red)">⚠️ Error al conectar con IA.</span>';}
};

// AI GENERATE TASKS
// ══════════════════════════════════════════════
const aiGenerateTasks=async(p)=>{
  const aiBox=document.getElementById(`ai-${p.id}`);
  const btn=document.querySelector(`.ai-gen-btn[data-id="${p.id}"]`);
  aiBox.style.display='block';
  aiBox.innerHTML='<span style="color:var(--accent)">✦ Generando tareas…</span>';
  btn.disabled=true;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,messages:[{role:'user',content:`Genera 5-8 subtareas accionables para el proyecto "${p.name}"${p.desc?` (${p.desc})`:''}. Responde SOLO con un JSON array de strings, sin backticks. Ejemplo: ["Tarea 1","Tarea 2"]`}]})});
    const data=await res.json();
    const raw=data.content?.find(c=>c.type==='text')?.text||'[]';
    const tasks=JSON.parse(raw.replace(/```json|```/g,'').trim());
    if(!Array.isArray(tasks)||!tasks.length) throw new Error('Sin tareas');
    aiBox.innerHTML=`<div style="font-weight:600;color:var(--accent2);margin-bottom:10px">✦ IA sugiere ${tasks.length} tareas:</div>
    ${tasks.map(t=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <button class="ai-task-add btn btn-primary" data-pid="${p.id}" data-task="${encodeURIComponent(t)}" style="padding:3px 10px;font-size:.72rem;flex-shrink:0">+</button>
      <span>${t}</span></div>`).join('')}
    <button class="btn btn-primary ai-add-all" data-pid="${p.id}" style="margin-top:10px;width:100%;font-size:.8rem">Agregar todas</button>`;
    aiBox.querySelectorAll('.ai-task-add').forEach(b=>{
      b.addEventListener('click',()=>{
        const proj=state.projects.find(x=>x.id==b.dataset.pid);if(!proj) return;
        if(!proj.tasks) proj.tasks=[];
        const title=decodeURIComponent(b.dataset.task);
        if(!proj.tasks.find(t=>t.title===title)){proj.tasks.push({title,done:false});save();renderTaskList(proj);updateProjProgress(proj);b.textContent='✓';b.disabled=true;}
      });
    });
    aiBox.querySelector('.ai-add-all').addEventListener('click',()=>{
      const proj=state.projects.find(x=>x.id==p.id);if(!proj) return;
      if(!proj.tasks) proj.tasks=[];
      tasks.forEach(t=>{if(!proj.tasks.find(x=>x.title===t))proj.tasks.push({title:t,done:false});});
      save();renderTaskList(proj);updateProjProgress(proj);
      aiBox.innerHTML='<span style="color:var(--green)">✅ Todas las tareas agregadas.</span>';
      toast('✅ Tareas de IA agregadas');
    });
  }catch{aiBox.innerHTML='<span style="color:var(--red)">⚠️ Error al generar tareas.</span>';}
  btn.disabled=false;
};

let calView='month', calCursor=new Date();
const HOURS=Array.from({length:24},(_,i)=>i);
const fmtTime=(h,m=0)=>`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
const fmtDate=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const sameDay=(a,b)=>fmtDate(new Date(a))===fmtDate(new Date(b));

const renderCalendarView=()=>{
  document.getElementById('content').style.padding='28px';
  document.getElementById('content').style.overflow='auto';
  document.getElementById('content').innerHTML=`
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">
    <div style="font-size:1.3rem;font-weight:800;display:flex;align-items:center;gap:8px"><span>📅</span> Calendario</div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <div style="display:flex;gap:4px" id="viewBtns">
        ${['month','week','day'].map(v=>`<button class="cal-view-btn${calView===v?' cv-active':''}" data-view="${v}" style="padding:7px 14px;border-radius:10px;border:1px solid ${calView===v?'var(--accent)':'var(--border)'};background:${calView===v?'var(--accent)':'var(--bg2)'};color:${calView===v?'#fff':'var(--text2)'};font-size:.8rem;cursor:pointer;transition:all .2s">${{month:'Mes',week:'Semana',day:'Día'}[v]}</button>`).join('')}
      </div>
      <div style="display:flex;gap:4px;align-items:center">
        <button id="cvPrev" style="width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);cursor:pointer;font-size:1rem">‹</button>
        <button id="cvToday" style="padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);font-size:.78rem;cursor:pointer">Hoy</button>
        <button id="cvNext" style="width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);cursor:pointer;font-size:1rem">›</button>
      </div>
      <button class="btn btn-primary" id="cvNewEvent" style="padding:8px 14px;font-size:.82rem">+ Evento</button>
    </div>
  </div>
  <div id="calTitle" style="font-size:1.05rem;font-weight:700;margin-bottom:14px;color:var(--text2)"></div>
  <div id="calViewBody" style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--card-r);overflow:hidden"></div>

  <div style="display:flex;align-items:center;justify-content:space-between;margin:28px 0 16px;flex-wrap:wrap;gap:10px">
    <div style="font-size:1.15rem;font-weight:800;display:flex;align-items:center;gap:8px"><span>🔁</span> Rutina</div>
    <button class="btn btn-primary" id="rtNewBlock" style="padding:8px 14px;font-size:.82rem">+ Bloque</button>
  </div>
  <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--card-r);padding:18px;overflow:hidden">
    <div id="rtDayTabs" style="display:flex;gap:6px;overflow-x:auto;margin-bottom:16px;padding-bottom:2px"></div>
    <div id="rtList" style="display:flex;flex-direction:column;gap:10px"></div>
  </div>`;

  document.getElementById('viewBtns').addEventListener('click',e=>{
    const btn=e.target.closest('[data-view]');if(!btn) return;
    calView=btn.dataset.view;
    document.querySelectorAll('.cal-view-btn').forEach(b=>{b.style.background='var(--bg2)';b.style.color='var(--text2)';b.style.borderColor='var(--border)';});

    drawCalView();
  });
  document.getElementById('cvPrev').addEventListener('click',()=>{shiftCal(-1);drawCalView();});
  document.getElementById('cvNext').addEventListener('click',()=>{shiftCal(1);drawCalView();});
  document.getElementById('cvToday').addEventListener('click',()=>{calCursor=new Date();drawCalView();});
  document.getElementById('cvNewEvent').addEventListener('click',()=>openEventEditor());
  document.getElementById('rtNewBlock').addEventListener('click',()=>openRoutineEditor());
