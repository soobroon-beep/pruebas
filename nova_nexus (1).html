const shiftCal=dir=>{
  if(calView==='month') calCursor.setMonth(calCursor.getMonth()+dir);
  else if(calView==='week') calCursor.setDate(calCursor.getDate()+dir*7);
  else calCursor.setDate(calCursor.getDate()+dir);
};

const drawCalView=()=>{
  const title=document.getElementById('calTitle'),body=document.getElementById('calViewBody');
  if(!title||!body) return;
  if(calView==='month'){title.textContent=`${months[calCursor.getMonth()]} ${calCursor.getFullYear()}`;drawMonth(body);}
  else if(calView==='week'){const w=weekRange(calCursor);title.textContent=`${w[0].toLocaleDateString('es-MX',{day:'numeric',month:'short'})} – ${w[6].toLocaleDateString('es-MX',{day:'numeric',month:'short',year:'numeric'})}`;drawWeek(body);}
  else{title.textContent=calCursor.toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long',year:'numeric'});drawDay(body);}
};

const drawMonth=body=>{
  const y=calCursor.getFullYear(),m=calCursor.getMonth();
  const first=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate();
  const today=new Date(),prevDays=new Date(y,m,0).getDate();
  body.innerHTML=`
  <div style="display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border)">
    ${['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'].map(d=>`<div style="padding:10px;text-align:center;font-size:.72rem;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:1px">${d}</div>`).join('')}
  </div>
  <div id="monthGrid" style="display:grid;grid-template-columns:repeat(7,1fr);"></div>`;
  const grid=document.getElementById('monthGrid');
  for(let i=0;i<42;i++){
    let day,isThis=true;
    if(i<first){day=prevDays-first+1+i;isThis=false;}
    else if(i>=first+days){day=i-first-days+1;isThis=false;}
    else day=i-first+1;
    const dateObj=isThis?new Date(y,m,day):null;
    const dateStr=dateObj?fmtDate(dateObj):'';
    const isToday=dateObj&&sameDay(dateObj,today);
    const evs=dateStr?state.events.filter(e=>e.date===dateStr):[];
    const cell=document.createElement('div');
    cell.style.cssText=`min-height:90px;padding:6px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;${!isThis?'opacity:.35':''}`;
    cell.innerHTML=`
      <div style="width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.82rem;font-weight:${isToday?700:400};background:${isToday?'var(--accent)':'transparent'};color:${isToday?'#fff':'var(--text)'};margin-bottom:4px">${day}</div>
      ${evs.slice(0,3).map(e=>`<div style="font-size:.68rem;padding:2px 6px;border-radius:4px;background:${e.color||'var(--accent)'};color:#fff;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;opacity:.9">${e.start?e.start+' ':''} ${e.title}</div>`).join('')}
      ${evs.length>3?`<div style="font-size:.65rem;color:var(--text3);padding:1px 4px">+${evs.length-3} más</div>`:''}`;
    if(isThis){
      cell.addEventListener('mouseenter',()=>cell.style.background='var(--bg3)');
      cell.addEventListener('mouseleave',()=>cell.style.background='');
      cell.addEventListener('click',()=>openEventEditor(dateStr));
    }
    grid.appendChild(cell);
  }
};

const weekRange=date=>{
  const d=new Date(date);d.setDate(d.getDate()-d.getDay());
  return Array.from({length:7},(_,i)=>{const x=new Date(d);x.setDate(d.getDate()+i);return x;});
};

const drawWeek=body=>{
  const days=weekRange(calCursor),today=new Date();
  body.style.overflowY='auto';body.style.maxHeight='72vh';
  body.innerHTML=`
  <div style="display:grid;grid-template-columns:52px repeat(7,1fr);position:sticky;top:0;background:var(--bg2);z-index:10;border-bottom:1px solid var(--border)">
    <div></div>
    ${days.map(d=>{
      const isT=sameDay(d,today);
      return `<div style="padding:10px 4px;text-align:center;border-left:1px solid var(--border)">
        <div style="font-size:.68rem;color:var(--text3);text-transform:uppercase;font-weight:600">${['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'][d.getDay()]}</div>
        <div style="width:30px;height:30px;border-radius:50%;margin:4px auto 0;display:flex;align-items:center;justify-content:center;font-size:.88rem;font-weight:700;background:${isT?'var(--accent)':'transparent'};color:${isT?'#fff':'var(--text)'}">${d.getDate()}</div>
      </div>`;
    }).join('')}
  </div>
  <div id="weekTimeGrid" style="display:grid;grid-template-columns:52px repeat(7,1fr);"></div>`;
  const grid=document.getElementById('weekTimeGrid');
  HOURS.forEach(h=>{
    const timeEl=document.createElement('div');
    timeEl.style.cssText='padding:0 8px;font-size:.68rem;color:var(--text3);height:56px;display:flex;align-items:flex-start;padding-top:4px;border-bottom:1px solid var(--border)';
    timeEl.textContent=h>0?fmtTime(h):'';
    grid.appendChild(timeEl);
    days.forEach(d=>{
      const dateStr=fmtDate(d);
      const slotEvs=state.events.filter(e=>e.date===dateStr&&e.start&&parseInt(e.start.split(':')[0])===h);
      const cell=document.createElement('div');
      cell.style.cssText='height:56px;border-left:1px solid var(--border);border-bottom:1px solid rgba(42,42,74,.5);padding:2px;cursor:pointer;transition:background .1s;position:relative';
      slotEvs.forEach(ev=>{
        const chip=document.createElement('div');
        chip.style.cssText=`font-size:.68rem;padding:2px 5px;border-radius:4px;background:${ev.color||'var(--accent)'};color:#fff;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer`;
        chip.textContent=`${ev.start} ${ev.title}`;
        chip.addEventListener('click',e=>{e.stopPropagation();openEventEditor(dateStr,ev);});
        cell.appendChild(chip);
      });
      cell.addEventListener('mouseenter',()=>cell.style.background='var(--bg3)');
      cell.addEventListener('mouseleave',()=>cell.style.background='');
      cell.addEventListener('click',()=>openEventEditor(dateStr));
      grid.appendChild(cell);
    });
  });
  setTimeout(()=>{body.scrollTop=56*7;},50);
};

const drawDay=body=>{
  const dateStr=fmtDate(calCursor);
  const dayEvs=state.events.filter(e=>e.date===dateStr);
  body.style.overflowY='auto';body.style.maxHeight='72vh';
  body.innerHTML=`
  <div style="padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
    <div style="font-size:.85rem;color:var(--text2)">${dayEvs.length} evento${dayEvs.length!==1?'s':''}</div>
    <button class="btn btn-primary" id="dayNewEvent" style="padding:6px 12px;font-size:.78rem">+ Evento</button>
  </div>
  <div id="dayTimeGrid" style="display:grid;grid-template-columns:56px 1fr;"></div>`;
  document.getElementById('dayNewEvent').addEventListener('click',()=>openEventEditor(dateStr));
  const grid=document.getElementById('dayTimeGrid');
  HOURS.forEach(h=>{
    const timeEl=document.createElement('div');
    timeEl.style.cssText='padding:0 10px;font-size:.7rem;color:var(--text3);height:64px;display:flex;align-items:flex-start;padding-top:6px;border-bottom:1px solid var(--border)';
    timeEl.textContent=h>0?fmtTime(h):'';
    grid.appendChild(timeEl);
    const slotEvs=dayEvs.filter(e=>e.start&&parseInt(e.start.split(':')[0])===h);
    const cell=document.createElement('div');
    cell.style.cssText='height:64px;border-left:1px solid var(--border);border-bottom:1px solid rgba(42,42,74,.5);padding:3px 6px;cursor:pointer;transition:background .1s';
    slotEvs.forEach(ev=>{
      const chip=document.createElement('div');
      chip.style.cssText=`font-size:.8rem;padding:4px 10px;border-radius:6px;background:${ev.color||'var(--accent)'};color:#fff;margin-bottom:2px;cursor:pointer;display:flex;align-items:center;gap:6px`;
      chip.innerHTML=`<span style="font-weight:600">${ev.start}${ev.end?'–'+ev.end:''}</span><span>${ev.title}</span>`;
      chip.addEventListener('click',e=>{e.stopPropagation();openEventEditor(dateStr,ev);});
      cell.appendChild(chip);
    });
    cell.addEventListener('mouseenter',()=>!slotEvs.length&&(cell.style.background='var(--bg3)'));
    cell.addEventListener('mouseleave',()=>cell.style.background='');
    cell.addEventListener('click',()=>{if(!slotEvs.length)openEventEditor(dateStr,null,fmtTime(h));});
    grid.appendChild(cell);
  });
  setTimeout(()=>{body.scrollTop=64*7;},50);
};

const openEventEditor=(dateStr='',existingEv=null,preTime='')=>{
  if(!dateStr) dateStr=fmtDate(new Date());
  const ev=existingEv;
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);z-index:2000;display:flex;align-items:center;justify-content:center';
  overlay.innerHTML=`
  <div style="background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:28px;width:460px;max-width:95vw">
    <div style="display:flex;justify-content:space-between;margin-bottom:20px">
      <h3 style="font-size:1.05rem;font-weight:700">${ev?'✏️ Editar evento':'📅 Nuevo evento'}</h3>
      <button id="evEdClose" style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:6px 10px;cursor:pointer;color:var(--text2)">✕</button>
    </div>
    <div style="margin-bottom:12px"><label style="font-size:.75rem;color:var(--text2);display:block;margin-bottom:5px">Título</label>
    <input id="evEdTitle" value="${ev?.title||''}" placeholder="Nombre del evento…" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-size:.9rem;outline:none"/></div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px">
      <div><label style="font-size:.72rem;color:var(--text2);display:block;margin-bottom:5px">Fecha</label>
      <input id="evEdDate" type="date" value="${ev?.date||dateStr}" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:8px 10px;color:var(--text);font-size:.82rem;outline:none"/></div>
      <div><label style="font-size:.72rem;color:var(--text2);display:block;margin-bottom:5px">Inicio</label>
      <input id="evEdStart" type="time" value="${ev?.start||preTime}" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:8px 10px;color:var(--text);font-size:.82rem;outline:none"/></div>
      <div><label style="font-size:.72rem;color:var(--text2);display:block;margin-bottom:5px">Fin</label>
      <input id="evEdEnd" type="time" value="${ev?.end||''}" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:8px 10px;color:var(--text);font-size:.82rem;outline:none"/></div>
    </div>

    <div style="margin-bottom:20px"><label style="font-size:.75rem;color:var(--text2);display:block;margin-bottom:8px">Color</label>
    <div style="display:flex;gap:8px" id="evColorPicker">
      ${NOTE_COLORS.map(c=>`<div data-cv="${c.val}" style="width:26px;height:26px;border-radius:50%;background:${c.val};cursor:pointer;border:3px solid ${(ev?.color||'var(--accent)')===c.val?'#fff':'transparent'};transition:all .15s;box-shadow:${(ev?.color||'var(--accent)')===c.val?'0 0 0 2px var(--accent)':'none'}"></div>`).join('')}
    </div></div>
    <div style="display:flex;justify-content:space-between;gap:10px">
      ${ev?`<button id="evEdDel" class="btn" style="background:rgba(248,113,113,.1);color:var(--red);border:1px solid var(--red)">🗑 Eliminar</button>`:'<div></div>'}
      <div style="display:flex;gap:8px">
        <button id="evEdCancel" class="btn btn-ghost">Cancelar</button>
        <button id="evEdSave" class="btn btn-primary">💾 Guardar</button>
      </div>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  document.getElementById('evEdTitle').focus();
  let selColor=ev?.color||'var(--accent)';
  document.getElementById('evColorPicker').addEventListener('click',e=>{
    const dot=e.target.closest('[data-cv]');if(!dot) return;
    selColor=dot.dataset.cv;
    document.querySelectorAll('#evColorPicker [data-cv]').forEach(d=>{d.style.border='3px solid transparent';d.style.boxShadow='none';});
    dot.style.border='3px solid #fff';dot.style.boxShadow='0 0 0 2px var(--accent)';
  });
  const close=()=>document.body.removeChild(overlay);
  document.getElementById('evEdClose').addEventListener('click',close);
  document.getElementById('evEdCancel').addEventListener('click',close);
  overlay.addEventListener('click',e=>{if(e.target===overlay)close();});
  if(ev) document.getElementById('evEdDel').addEventListener('click',()=>{
    if(!confirm('¿Eliminar evento?')) return;
    state.events=state.events.filter(x=>x.id!=ev.id);
    save();close();drawCalView();toast('🗑 Evento eliminado');
  });
  document.getElementById('evEdSave').addEventListener('click',()=>{
    const title=document.getElementById('evEdTitle').value.trim();
    if(!title){toast('⚠️ Agrega un título');return;}
    if(ev){
      const idx=state.events.findIndex(x=>x.id==ev.id);
      state.events[idx]={...state.events[idx],title,date:document.getElementById('evEdDate').value,start:document.getElementById('evEdStart').value,end:document.getElementById('evEdEnd').value,desc:document.getElementById('evEdDesc').value,color:selColor};
    }else{
      state.events.push({id:Date.now(),title,date:document.getElementById('evEdDate').value,start:document.getElementById('evEdStart').value,end:document.getElementById('evEdEnd').value,desc:document.getElementById('evEdDesc').value,color:selColor});
    }
    save();close();drawCalView();renderCalendar();
    toast(ev?'✅ Evento actualizado':'✅ Evento guardado');
  });
};

// ══════════════════════════════════════════════
// RUTINA (weekly schedule blocks)
// ══════════════════════════════════════════════
const WEEKDAY_NAMES=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const WEEKDAY_SHORT=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
let rtSelectedDay=new Date().getDay();
let rtTimer=null;

const timeToMin=t=>{ if(!t) return null; const [h,m]=t.split(':').map(Number); return h*60+(m||0); };
const nowMin=()=>{ const n=new Date(); return n.getHours()*60+n.getMinutes(); };

const routineStatus=(block)=>{
  if(rtSelectedDay!==new Date().getDay()) return null; // status only meaningful for today
  const s=timeToMin(block.start), e=timeToMin(block.end);
  const n=nowMin();
  if(s==null) return null;
  if(e!=null && n>=s && n<e) return {label:'● En curso',color:'var(--green)'};
  if(e!=null && n>=e) return {label:'✓ Completado',color:'var(--text3)'};
  if(n<s) return {label:'○ Por pasar',color:'var(--accent3)'};
  if(e==null && n>=s) return {label:'● En curso',color:'var(--green)'};
  return null;
};

const renderRoutineSection=()=>{
  const tabsEl=document.getElementById('rtDayTabs');
  if(!tabsEl) return;
  const today=new Date().getDay();
  tabsEl.innerHTML=WEEKDAY_SHORT.map((d,i)=>`
    <button data-day="${i}" style="flex-shrink:0;padding:8px 16px;border-radius:10px;border:1px solid ${rtSelectedDay===i?'var(--accent)':'var(--border)'};background:${rtSelectedDay===i?'var(--accent)':'var(--bg3)'};color:${rtSelectedDay===i?'#fff':'var(--text2)'};font-size:.8rem;font-weight:${i===today?700:400};cursor:pointer;transition:all .2s;position:relative">
      ${d}${i===today?' <span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:'+(rtSelectedDay===i?'#fff':'var(--accent)')+';margin-left:4px;vertical-align:middle"></span>':''}
    </button>`).join('');
  tabsEl.querySelectorAll('[data-day]').forEach(btn=>{
    btn.addEventListener('click',()=>{ rtSelectedDay=parseInt(btn.dataset.day); renderRoutineSection(); });
  });
  drawRoutineList();
  if(rtTimer) clearInterval(rtTimer);
  rtTimer=setInterval(()=>{ if(document.getElementById('rtList')) drawRoutineList(); else clearInterval(rtTimer); },30000);
};

const drawRoutineList=()=>{
  const list=document.getElementById('rtList');
  if(!list) return;
  const blocks=(state.routines||[]).filter(b=>(b.days||[]).includes(rtSelectedDay)).sort((a,b)=>timeToMin(a.start)-timeToMin(b.start));
  if(!blocks.length){
    list.innerHTML=`<div style="text-align:center;padding:30px 10px;color:var(--text3);font-size:.85rem">Sin bloques para ${WEEKDAY_NAMES[rtSelectedDay].toLowerCase()}. Agrega uno con "+ Bloque".</div>`;
    return;
  }
  list.innerHTML=blocks.map(b=>{
    const st=routineStatus(b);
    const dimmed=st&&st.label.includes('Completado');
    return `
    <div data-rid="${b.id}" class="rt-block" style="display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:12px;background:var(--bg3);border:1px solid var(--border);border-left:4px solid ${b.color||'var(--accent)'};cursor:pointer;transition:var(--trans);opacity:${dimmed?.6:1}">
      <div style="min-width:96px;font-size:.82rem;font-weight:700;color:var(--text2)">${b.start}${b.end?'–'+b.end:''}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:.92rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${b.title}</div>
        ${b.desc?`<div style="font-size:.78rem;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${b.desc}</div>`:''}
      </div>
      ${st?`<div style="font-size:.74rem;font-weight:700;color:${st.color};white-space:nowrap">${st.label}</div>`:''}
    </div>`;
  }).join('');
  list.querySelectorAll('[data-rid]').forEach(el=>{
    el.addEventListener('mouseenter',()=>el.style.borderColor='var(--accent)');
    el.addEventListener('mouseleave',()=>el.style.borderColor='var(--border)');
    el.addEventListener('click',()=>{
      const block=state.routines.find(x=>x.id==el.dataset.rid);
      if(block) openRoutineEditor(block);
    });
  });
};

const openRoutineEditor=(existingBlock=null)=>{
  const b=existingBlock;
  let selDays=b?[...b.days]:[rtSelectedDay];
  let selColor=b?.color||'var(--accent)';
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);z-index:2000;display:flex;align-items:center;justify-content:center';
  overlay.innerHTML=`
  <div style="background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:28px;width:460px;max-width:95vw">
    <div style="display:flex;justify-content:space-between;margin-bottom:20px">
      <h3 style="font-size:1.05rem;font-weight:700">${b?'✏️ Editar bloque':'🔁 Nuevo bloque de rutina'}</h3>
      <button id="rtEdClose" style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:6px 10px;cursor:pointer;color:var(--text2)">✕</button>
    </div>
    <div style="margin-bottom:12px"><label style="font-size:.75rem;color:var(--text2);display:block;margin-bottom:5px">Título</label>
    <input id="rtEdTitle" value="${b?.title||''}" placeholder="Ej. Gimnasio, Trabajo, Lectura…" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-size:.9rem;outline:none"/></div>
    <div style="margin-bottom:12px"><label style="font-size:.75rem;color:var(--text2);display:block;margin-bottom:8px">Días</label>
    <div style="display:flex;gap:6px;flex-wrap:wrap" id="rtDayPicker">
      ${WEEKDAY_SHORT.map((d,i)=>`<div data-d="${i}" style="padding:7px 12px;border-radius:8px;cursor:pointer;font-size:.78rem;font-weight:600;border:1px solid ${selDays.includes(i)?'var(--accent)':'var(--border)'};background:${selDays.includes(i)?'var(--accent)':'var(--bg3)'};color:${selDays.includes(i)?'#fff':'var(--text2)'};transition:all .15s">${d}</div>`).join('')}
    </div></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
      <div><label style="font-size:.72rem;color:var(--text2);display:block;margin-bottom:5px">Inicio</label>
      <input id="rtEdStart" type="time" value="${b?.start||''}" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:8px 10px;color:var(--text);font-size:.82rem;outline:none"/></div>
      <div><label style="font-size:.72rem;color:var(--text2);display:block;margin-bottom:5px">Fin</label>
      <input id="rtEdEnd" type="time" value="${b?.end||''}" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:8px 10px;color:var(--text);font-size:.82rem;outline:none"/></div>
    </div>
    <div style="margin-bottom:12px"><label style="font-size:.75rem;color:var(--text2);display:block;margin-bottom:5px">Descripción</label>
    <textarea id="rtEdDesc" rows="2" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-size:.85rem;outline:none;resize:none;font-family:inherit">${b?.desc||''}</textarea></div>
    <div style="margin-bottom:20px"><label style="font-size:.75rem;color:var(--text2);display:block;margin-bottom:8px">Color</label>
    <div style="display:flex;gap:8px" id="rtColorPicker">
      ${NOTE_COLORS.map(c=>`<div data-cv="${c.val}" style="width:26px;height:26px;border-radius:50%;background:${c.val};cursor:pointer;border:3px solid ${selColor===c.val?'#fff':'transparent'};transition:all .15s;box-shadow:${selColor===c.val?'0 0 0 2px var(--accent)':'none'}"></div>`).join('')}
    </div></div>
    <div style="display:flex;justify-content:space-between;gap:10px">
      ${b?`<button id="rtEdDel" class="btn" style="background:rgba(248,113,113,.1);color:var(--red);border:1px solid var(--red)">🗑 Eliminar</button>`:'<div></div>'}
      <div style="display:flex;gap:8px">
        <button id="rtEdCancel" class="btn btn-ghost">Cancelar</button>
        <button id="rtEdSave" class="btn btn-primary">💾 Guardar</button>
      </div>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  document.getElementById('rtEdTitle').focus();
  document.getElementById('rtDayPicker').addEventListener('click',e=>{
    const d=e.target.closest('[data-d]');if(!d) return;
    const idx=parseInt(d.dataset.d);
    if(selDays.includes(idx)) selDays=selDays.filter(x=>x!==idx); else selDays.push(idx);
    document.querySelectorAll('#rtDayPicker [data-d]').forEach(el=>{
      const i=parseInt(el.dataset.d), on=selDays.includes(i);
      el.style.border=`1px solid ${on?'var(--accent)':'var(--border)'}`;
      el.style.background=on?'var(--accent)':'var(--bg3)';
      el.style.color=on?'#fff':'var(--text2)';
    });
  });
  document.getElementById('rtColorPicker').addEventListener('click',e=>{
    const dot=e.target.closest('[data-cv]');if(!dot) return;
    selColor=dot.dataset.cv;
    document.querySelectorAll('#rtColorPicker [data-cv]').forEach(d=>{d.style.border='3px solid transparent';d.style.boxShadow='none';});
    dot.style.border='3px solid #fff';dot.style.boxShadow='0 0 0 2px var(--accent)';
  });
  const close=()=>document.body.removeChild(overlay);
  document.getElementById('rtEdClose').addEventListener('click',close);
  document.getElementById('rtEdCancel').addEventListener('click',close);
  overlay.addEventListener('click',e=>{if(e.target===overlay)close();});
  if(b) document.getElementById('rtEdDel').addEventListener('click',()=>{
    if(!confirm('¿Eliminar bloque de rutina?')) return;
    state.routines=state.routines.filter(x=>x.id!=b.id);
    save();close();renderRoutineSection();toast('🗑 Bloque eliminado');
  });
  document.getElementById('rtEdSave').addEventListener('click',()=>{
    const title=document.getElementById('rtEdTitle').value.trim();
    const start=document.getElementById('rtEdStart').value;
    if(!title){toast('⚠️ Agrega un título');return;}
    if(!start){toast('⚠️ Define una hora de inicio');return;}
    if(!selDays.length){toast('⚠️ Selecciona al menos un día');return;}
    const end=document.getElementById('rtEdEnd').value;
    const desc=document.getElementById('rtEdDesc').value;
    if(b){
      const idx=state.routines.findIndex(x=>x.id==b.id);
      state.routines[idx]={...state.routines[idx],title,days:selDays,start,end,desc,color:selColor};
    }else{
      state.routines.push({id:Date.now(),title,days:selDays,start,end,desc,color:selColor});
    }
    save();close();renderRoutineSection();
    toast(b?'✅ Bloque actualizado':'✅ Bloque guardado');
  });
};
const HABIT_ICONS=['🔥','💪','📚','🧘','🏃','💧','✍️','🎯','🌱','😴','🍎','🧠','🎨','🎵','💊'];
const todayStr=()=>fmtDate(new Date());

const habitStreak=h=>{
  if(!h.logs?.length) return 0;
  const sorted=[...new Set(h.logs)].sort((a,b)=>b.localeCompare(a));
  let streak=0,cur=new Date();
  for(let i=0;i<sorted.length;i++){
    const d=fmtDate(cur);
    if(sorted.includes(d)){streak++;cur.setDate(cur.getDate()-1);}
    else if(i===0&&d!==sorted[0]) break;
    else break;
  }
  return streak;
};

const habitDoneToday=h=>(h.logs||[]).includes(todayStr());

const last21Days=()=>Array.from({length:21},(_,i)=>{const d=new Date();d.setDate(d.getDate()-20+i);return fmtDate(d);});

const renderHabitsView=()=>{
  if(!state.habits) state.habits=[];
  document.getElementById('content').style.padding='28px';
  document.getElementById('content').style.overflow='auto';
  document.getElementById('content').innerHTML=`
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px">
    <div style="font-size:1.3rem;font-weight:800;display:flex;align-items:center;gap:8px"><span>🔥</span> Hábitos</div>
    <button class="btn btn-primary" id="newHabitBtn" style="padding:8px 16px;font-size:.82rem">+ Nuevo hábito</button>
  </div>
  <div id="habitSummary" style="background:linear-gradient(135deg,rgba(124,106,247,.12),rgba(56,189,248,.06));border:1px solid rgba(124,106,247,.25);border-radius:16px;padding:20px;margin-bottom:24px;display:flex;align-items:center;gap:20px;flex-wrap:wrap"></div>
  <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--card-r);overflow:hidden">
    <div id="daysHeader" style="display:grid;border-bottom:1px solid var(--border);overflow-x:auto"></div>
    <div id="habitRows"></div>
  </div>
  <div id="emptyHabits" style="display:none;text-align:center;padding:60px;color:var(--text3);font-size:.9rem">Sin hábitos aún. ¡Crea el primero!</div>`;
  document.getElementById('newHabitBtn').addEventListener('click',openHabitEditor);
  drawHabitsGrid();
};

const drawHabitsGrid=()=>{
  const sum=document.getElementById('habitSummary');
  const daysHdr=document.getElementById('daysHeader');
  const rows=document.getElementById('habitRows');
  const empty=document.getElementById('emptyHabits');
  if(!sum||!daysHdr||!rows) return;
  const days=last21Days(),today=todayStr(),habits=state.habits||[];
  const doneToday=habits.filter(h=>habitDoneToday(h)).length;
  const totalToday=habits.length;
  const pct=totalToday?Math.round(doneToday/totalToday*100):0;
  const topStreak=habits.reduce((m,h)=>Math.max(m,habitStreak(h)),0);
  sum.innerHTML=`
    <div style="flex:1;min-width:160px">
      <div style="font-size:.75rem;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Progreso de hoy</div>
      <div style="font-size:2.2rem;font-weight:800;line-height:1">${doneToday}<span style="font-size:1rem;color:var(--text3);font-weight:400"> / ${totalToday}</span></div>
      <div style="height:6px;background:var(--border);border-radius:10px;margin-top:10px;overflow:hidden"><div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:10px;transition:width 1s"></div></div>
    </div>
    <div style="text-align:center;padding:0 20px;border-left:1px solid var(--border)"><div style="font-size:2rem;font-weight:800">${topStreak}</div><div style="font-size:.75rem;color:var(--text3)">Racha máx.</div></div>
    <div style="text-align:center;padding:0 20px;border-left:1px solid var(--border)"><div style="font-size:2rem;font-weight:800">${pct}%</div><div style="font-size:.75rem;color:var(--text3)">Hoy</div></div>
    <div style="text-align:center;padding:0 20px;border-left:1px solid var(--border)"><div style="font-size:2rem;font-weight:800">${habits.reduce((a,h)=>(h.logs||[]).filter(d=>d>=days[0]).length+a,0)}</div><div style="font-size:.75rem;color:var(--text3)">Completados (21d)</div></div>`;
  if(!habits.length){empty.style.display='block';daysHdr.innerHTML='';rows.innerHTML='';return;}
  empty.style.display='none';
  const cols=`56px 180px repeat(${days.length},1fr) 80px`;
  daysHdr.style.cssText=`display:grid;grid-template-columns:${cols};min-width:600px`;
  daysHdr.innerHTML=`<div></div><div></div>`+days.map(d=>{
    const dt=new Date(d+'T12:00:00'),isT=d===today;
    return `<div style="padding:8px 2px;text-align:center;font-size:.6rem;color:${isT?'var(--accent2)':'var(--text3)'};font-weight:${isT?700:400}">
      <div>${['D','L','M','X','J','V','S'][dt.getDay()]}</div>
      <div style="font-size:.7rem;font-weight:${isT?700:400};color:${isT?'var(--accent)':'var(--text3)'}">${dt.getDate()}</div>
    </div>`;
  }).join('')+`<div style="padding:8px;text-align:center;font-size:.65rem;color:var(--text3)">Racha</div>`;
  rows.innerHTML='';
  habits.forEach(h=>{
    const streak=habitStreak(h);
    const row=document.createElement('div');
    row.style.cssText=`display:grid;grid-template-columns:${cols};border-top:1px solid var(--border);min-width:600px;transition:background .15s`;
    row.addEventListener('mouseenter',()=>row.style.background='rgba(255,255,255,.02)');
    row.addEventListener('mouseleave',()=>row.style.background='');
    const iconCell=document.createElement('div');
    iconCell.style.cssText='display:flex;align-items:center;justify-content:center;padding:14px 8px';
    iconCell.innerHTML=`<div style="width:36px;height:36px;border-radius:10px;background:${h.color||'var(--accent)'};display:flex;align-items:center;justify-content:center;font-size:1.1rem;opacity:.85">${h.icon||'🔥'}</div>`;
    row.appendChild(iconCell);
    const nameCell=document.createElement('div');
    nameCell.style.cssText='display:flex;flex-direction:column;justify-content:center;padding:10px 12px 10px 4px;';
    nameCell.innerHTML=`
      <div style="font-size:.88rem;font-weight:600">${h.name}</div>
      <div style="font-size:.7rem;color:var(--text3);margin-top:2px">${h.freq==='daily'?'Diario':'Semanal'}${h.target>1?` · ${h.target}x`:''}</div>
      <div style="display:flex;gap:6px;margin-top:6px">
        <button data-hid="${h.id}" data-action="edit" style="font-size:.65rem;padding:2px 8px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text3);cursor:pointer">✏️</button>
        <button data-hid="${h.id}" data-action="del" style="font-size:.65rem;padding:2px 8px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--red);cursor:pointer">🗑</button>
      </div>`;
    row.appendChild(nameCell);
    days.forEach(d=>{
      const done=(h.logs||[]).includes(d),isT=d===today;
      const dot=document.createElement('div');
      dot.style.cssText='display:flex;align-items:center;justify-content:center;cursor:pointer';
      dot.innerHTML=`<div style="width:22px;height:22px;border-radius:6px;background:${done?(h.color||'var(--accent)'):'var(--bg3)'};border:1px solid ${isT&&!done?'var(--accent)':'transparent'};transition:all .2s;display:flex;align-items:center;justify-content:center;font-size:.7rem">${done?'✓':''}</div>`;
      dot.addEventListener('click',()=>toggleHabitLog(h.id,d));
      row.appendChild(dot);
    });
    const streakCell=document.createElement('div');
    streakCell.style.cssText='display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px';
    streakCell.innerHTML=`<div style="font-size:1.1rem;font-weight:800;color:${streak>0?'var(--yellow)':'var(--text3)'}">${streak}</div><div style="font-size:.62rem;color:var(--text3)">🔥 días</div>`;
    row.appendChild(streakCell);
    nameCell.querySelector('[data-action=edit]').addEventListener('click',e=>{e.stopPropagation();openHabitEditor(h);});
    nameCell.querySelector('[data-action=del]').addEventListener('click',e=>{e.stopPropagation();deleteHabit(h.id);});
    rows.appendChild(row);
  });
};

const toggleHabitLog=(hid,dateS)=>{
  const h=state.habits.find(x=>x.id==hid);if(!h) return;
  if(!h.logs) h.logs=[];
  const idx=h.logs.indexOf(dateS);
  if(idx>=0) h.logs.splice(idx,1);
  else{h.logs.push(dateS);if(dateS===todayStr())toast(`🔥 +1 ${h.name}`);}
  save();drawHabitsGrid();
};

const deleteHabit=id=>{
  if(!confirm('¿Eliminar este hábito?')) return;
  state.habits=state.habits.filter(h=>h.id!=id);
  save();drawHabitsGrid();toast('🗑 Hábito eliminado');
};

        <option value="daily" ${(!h||h.freq==='daily')?'selected':''}>Diario</option>
        <option value="weekly" ${h?.freq==='weekly'?'selected':''}>Semanal</option>
      </select></div>
      <div><label style="font-size:.75rem;color:var(--text2);display:block;margin-bottom:5px">Meta diaria</label>
      <input id="hEdTarget" type="number" min="1" max="10" value="${h?.target||1}" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:9px 12px;color:var(--text);font-size:.85rem;outline:none"/></div>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:10px">
      <button id="hEdCancel" class="btn btn-ghost">Cancelar</button>
      <button id="hEdSave" class="btn btn-primary">💾 Guardar</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  document.getElementById('hEdName').focus();
  let selIcon=h?.icon||'🔥',selColor=h?.color||'var(--accent)';
  document.getElementById('iconPicker').addEventListener('click',e=>{
    const dot=e.target.closest('[data-ic]');if(!dot) return;
    selIcon=dot.dataset.ic;
    document.querySelectorAll('#iconPicker [data-ic]').forEach(d=>{d.style.background='var(--bg3)';d.style.borderColor='transparent';});
    dot.style.background='var(--accent)';dot.style.borderColor='var(--accent2)';
  });
  document.getElementById('hColorPicker').addEventListener('click',e=>{
    const dot=e.target.closest('[data-cv]');if(!dot) return;
    selColor=dot.dataset.cv;
    document.querySelectorAll('#hColorPicker [data-cv]').forEach(d=>{d.style.border='3px solid transparent';d.style.boxShadow='none';});
    dot.style.border='3px solid #fff';dot.style.boxShadow='0 0 0 2px var(--accent)';
  });
  const close=()=>document.body.removeChild(overlay);
  document.getElementById('hEdClose').addEventListener('click',close);
  document.getElementById('hEdCancel').addEventListener('click',close);
  overlay.addEventListener('click',e=>{if(e.target===overlay)close();});
  document.getElementById('hEdSave').addEventListener('click',()=>{
    const name=document.getElementById('hEdName').value.trim();
    if(!name){toast('⚠️ Agrega un nombre');return;}
    if(!state.habits) state.habits=[];
    if(h){
      const idx=state.habits.findIndex(x=>x.id==h.id);
      state.habits[idx]={...state.habits[idx],name,icon:selIcon,color:selColor,freq:document.getElementById('hEdFreq').value,target:parseInt(document.getElementById('hEdTarget').value)||1};
    }else{
      state.habits.push({id:Date.now(),name,icon:selIcon,color:selColor,freq:document.getElementById('hEdFreq').value,target:parseInt(document.getElementById('hEdTarget').value)||1,logs:[]});
    }
    save();close();drawHabitsGrid();toast(h?'✅ Hábito actualizado':'✅ Hábito creado');
  });
};

    {id:2,title:'Ideas para hoy',body:'Definir objetivos semanales, revisar proyectos pendientes y bloquear tiempo en el calendario.',color:'var(--green)',tags:['ideas','hoy'],pinned:false,createdAt:new Date().toISOString()},
    {id:3,title:'Leer esta semana',body:'Deep Work — Cal Newport. Atomic Habits — James Clear.',color:'var(--yellow)',tags:['libros'],pinned:false,createdAt:new Date().toISOString()},

    {id:2,title:'Bloque de trabajo profundo',date:today,start:'11:00',end:'13:00',color:'var(--green)'},

    {id:2,name:'Rutina matutina',desc:'Diseñar e implementar rutina de alta productividad.',status:'pause',tasks:[{title:'Definir hábitos',done:true},{title:'Crear horario',done:true}]},

// auto-reconnect Firebase if credentials saved
const autoConnectFirebase=async()=>{
  const {firebaseApiKey,firebaseProjectId,autoSync}=state.settings;
  if(firebaseApiKey&&firebaseProjectId){
    await fb.init(firebaseApiKey,firebaseProjectId);
  }
};

seed();
renderDashboard();
autoConnectFirebase();
</script>
